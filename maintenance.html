<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Africa2KBall — Maintenance</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0b09;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 32px 20px;
    }

    .maintenance-wrap {
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .maintenance-logo {
      width: clamp(80px, 20vw, 120px);
      height: auto;
      margin-bottom: 40px;
      opacity: 0.92;
    }

    .maintenance-divider {
      width: 48px;
      height: 2px;
      background: #c8812a;
      margin: 0 auto 32px;
    }

    .maintenance-label {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c8812a;
      margin-bottom: 20px;
    }

    .maintenance-title {
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 400;
      color: #f0e6d3;
      line-height: 1.55;
      margin-bottom: 20px;
    }

    .maintenance-sub {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.82rem;
      color: #7a6a55;
      letter-spacing: 0.04em;
      margin-top: 8px;
    }

    .maintenance-footer {
      margin-top: 56px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.68rem;
      color: #3a2e22;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="maintenance-wrap">

    <img
      src="assets/images/logo-africa2kball.png"
      alt="Africa2KBall"
      class="maintenance-logo"
      onerror="this.style.display='none'"
    />

    <p class="maintenance-label">Africa2KBall — Édition 3</p>

    <div class="maintenance-divider"></div>

    <h1 class="maintenance-title">
      Maintenance actuellement en cours,<br />
      le site sera bientôt disponible.
    </h1>

    <p class="maintenance-sub">Merci pour votre patience.</p>

    <p class="maintenance-footer">07 juin 2026 &mdash; Gymnase Lino Ventura, Pavillons-sous-Bois</p>

  </div>
</body>
</html>
